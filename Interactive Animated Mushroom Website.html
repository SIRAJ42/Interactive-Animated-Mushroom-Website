<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Animated Website</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        }

        header nav {
            background: rgba(255, 255, 255, 0.08);
            padding: 20px;
            text-align: center;
            animation: nav 1.2s ease forwards;
        }

        @keyframes nav {
            from {
                transform: translateY(-80px);

            }

            to {
                transform: translateY(0);

            }
        }

        nav a {
            text-decoration: none;
            font-size: 22px;
            margin-right: 30px;
            color: #ff9ff3;
            transition: 0.4s ease;
            position: relative;
        }

        nav a:hover {
            color: #00f2ff;
            transform: translateY(-5px) scale(1.1);
            text-shadow: 0 0 15px #00f2ff;
        }


        nav a::after {
            position: absolute;
            left: 0;
            bottom: -5px;
            width: 0%;
            height: 2px;
            background: #00f2ff;
            transition: 0.4s;
        }

        nav a:hover::after {
            width: 100%;
        }


        input {
            border-radius: 25px;
            padding: 8px 15px;
            border: none;
            background: #1e1e2f;
            color: white;
            transition: 0.4s ease;
        }

        input:hover {
            box-shadow: 0 0 15px #ff00ff;
            transform: scale(1.1);
        }


        .main {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 80px;
        }


        .left {
            width: 50%;
            animation: left 2s ease forwards;
            animation-delay: 1s;
        }

        @keyframes Left {
            from {
                transform: translateX(-100px);

            }

            to {
                transform: translateX(0);

            }
        }

        .left h1 {
            font-size: 55px;
            color: white;
            line-height: 60px;
        }

        .left h1 span {
            color: #ff00ff;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 5px #ff00ff;
            }

            to {
                text-shadow: 0 0 25px #ff00ff, 0 0 40px #00f2ff;
            }
        }

        .left p {
            color: #dcdcdc;
            margin-top: 20px;
        }


        .left button {
            padding: 12px 25px;
            margin-top: 30px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(45deg, #ff00ff, #00f2ff);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.4s ease;
            animation-name: Btn;
            animation-duration: 3s;
            animation-timing-function: ease-in-out;
            animation-iteration-count: infinite;
            animation-direction: alternate;
        }

        @keyframes Btn {
            from {
                transform: translateY(0);
            }

            to {
                transform: translateY(-12px);
            }
        }

        .left button:hover {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 0 20px #d714d7;
            animation-play-state: paused;
        }

        .right img {
            width: 400px;
            animation: img 4s infinite alternate;
        }

        @keyframes img {
            from {
                transform: translateY(0);
            }

            to {
                transform: translateY(-25px);
            }
        }

        .right img:hover {
            transform: scale(1.1) rotate(3deg);
            transition: 0.5s;
        }

        .right {
            position: relative;
            width: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .circle {
            position: absolute;
            bottom: -40px;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 6px solid #00f2ff;
            border-top: 6px solid #ff00ff;
            animation-fill-mode: both;
            animation-name: simple;
            animation-duration: 4s;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
            animation-direction: normal;
        }

        @keyframes simple {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <header>
        <nav>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Services</a>
            <a href="#">Login</a>
            <a href="#">Signup</a>
            <input type="search" placeholder="Search...">
        </nav>
    </header>

    <main class="main">

        <div class="left">
            <h1>Web Design & <br><span>Development</span></h1>
            <p>
                Web design focuses on visual layout and user experience,
                while development transforms designs into functional websites
                using HTML, CSS and backend systems.
            </p>
            <button>READ MORE</button>
        </div>
        
        <div class="right">
            <img src="mushroom.png" alt="image">
            <div class="circle"></div>
        </div>

    </main>

</body>

</html>
